services:
  - type: web
    name: stockvibe-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: STOCKVIBE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
